# Optional slicer-API sidecar stack for BamDude.
#
# Both services are HTTP wrappers around a slicer CLI: the same Node code
# (`kainpl/orca-slicer-api`, `bamdude/profile-resolver` branch -- BamDude's
# fork of the upstream `AFKFelix/orca-slicer-api` carrying the inherits-chain
# resolver, sentinel-value strip, multi-filament + live-progress patches that
# are required to slice real OrcaSlicer / BambuStudio GUI exports without
# segfaulting the CLI). BamDude talks to them via the URLs configured in
# Settings → Profiles → Slicer API.
#
#   bambu-studio-api  → host port 3001 (BambuStudio CLI)
#   orca-slicer-api   → host port 3003 (OrcaSlicer CLI)
#
# BamDude's virtual-printer feature reserves host ports 3000 and 3002,
# which is why the OrcaSlicer sidecar sits on 3003. Override either port
# in `.env` (see `.env.example`) if you don't run BamDude on this host.
#
# Both services live behind explicit profiles so the user picks exactly
# which slicer(s) they want; a bare `docker compose up -d` (no profile)
# starts nothing.
#
# Usage:
#   cd slicer-api/
#   docker compose --profile orca   up -d   # OrcaSlicer only
#   docker compose --profile bambu  up -d   # BambuStudio only
#   docker compose --profile all    up -d   # both
#
# First build pulls the source from the fork over git (~5 min per service
# — downloads the OrcaSlicer ~110 MB or BambuStudio ~220 MB AppImage)
# and caches the image locally. Subsequent runs reuse the cache. Pin the
# slicer versions via .env.

services:
  orca-slicer-api:
    build:
      context: https://github.com/kainpl/orca-slicer-api.git#bamdude/profile-resolver
      dockerfile: Dockerfile
      args:
        ORCA_VERSION: "${ORCA_VERSION:-2.3.2}"
    image: bamdude-orca-slicer-api:orca${ORCA_VERSION:-2.3.2}
    container_name: orca-slicer-api
    restart: unless-stopped
    ports:
      - "${ORCA_API_PORT:-3003}:3000"
    volumes:
      - ./data/orca:/app/data
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    profiles:
      - orca
      - all

  bambu-studio-api:
    build:
      context: https://github.com/kainpl/orca-slicer-api.git#bamdude/profile-resolver
      dockerfile: Dockerfile.bambu-studio
      args:
        BAMBU_VERSION: "${BAMBU_VERSION:-02.06.00.51}"
    image: bamdude-bambu-studio-api:bambu${BAMBU_VERSION:-02.06.00.51}
    container_name: bambu-studio-api
    restart: unless-stopped
    ports:
      - "${BAMBU_API_PORT:-3001}:3000"
    volumes:
      - ./data/bambu:/app/data
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    profiles:
      - bambu
      - all
