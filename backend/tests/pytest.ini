[pytest]
testpaths = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
    # Filter warnings from async mocks - coroutines created by mocks that are
    # intentionally not awaited (expected behavior in unit tests)
    ignore:coroutine.*was never awaited:RuntimeWarning
    # aiosqlite's worker thread occasionally fires a callback into a pytest
    # event loop that has already closed between tests — surfaces as
    # PytestUnhandledThreadExceptionWarning but is harmless (the test
    # already passed; cleanup ran). The autouse `_cancel_leaked_tasks`
    # fixture in conftest.py cancels most leaked tasks proactively; this
    # filter swallows what slips past (aiosqlite workers are separate from
    # asyncio tasks and can't always be cancelled).
    ignore:.*Event loop is closed.*:pytest.PytestUnhandledThreadExceptionWarning
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (slower, test full API)
    slow: Slow tests (skip with -m "not slow")
